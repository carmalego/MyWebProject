<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>skills</title>
  <style>
  table {
    border-collapse: collapse; /* Ensures single lines between cells */
    width: 60%;
  }
  th, td {
    border: 1px solid black; /* Adds lines around cells */
   padding: 10px; /* Adjusts indentation/spacing inside columns */
    text-align: left;
  }
</style>
</head>
<body>
   
  <h1>My skills</h1>
  <table>
  <tr>
  </th> 
    <th>Topic</th>
    <th>Level of Knowledge</th>
    <th>Since When</th>
  </tr>
  <tr>
    <td>HTML</td>
    <td>Advanced</td>
    <td>2020</td>
  </tr>
  <tr>
    <td>CSS</td>
    <td>Intermediate</td>
    <td>2021</td>
  </tr>
  <tr>
    <td>JavaScript</td>
    <td>Beginner</td>
    <td>2023</td>
  </tr>
  <tr>
    <td>Python</td>
    <td>Advanced</td>
    <td>2019</td>
  </tr>
<figcaption>My actual skills.</figcaption>
</table>   
 <tfoot> 
    <form action="/kontakt" method="post">
  <fieldset>
  <legend>Persönliche Daten</legend>
  <label for="vorname">Vorname *</label>
  <input type="text" name="vorname" id="vorname"
  required minlength="2">
  <label for="nachname">Nachname *</label>
  <input type="text" name="nachname" id="nachname"
  required minlength="2">
  <label for="email">E-Mail-Adresse *</label>
  <input type="email" name="email" id="email" required>
  <label for="telefon">Telefon</label>
  <input type="tel" name="telefon" id="telefon">
  <label for="geburtsdatum">Geburtsdatum</label>
  <input type="date" name="geburtsdatum" id="geburtsdatum">
  </fieldset>
  <fieldset>
  <legend>Nachricht</legend>
  <label for="betreff">Betreff *</label>
  <select id="betreff" name="betreff" required>
  <option value="" disabled selected>— Bitte wählen —</option>
  <option value="frage">Allgemeine Frage</option>
  <option value="angebot">Angebotsanfrage</option>
  <option value="feedback">Feedback</option>
  <option value="sonstiges">Sonstiges</option>
  </select>
  <label for="nachricht">Nachricht *</label>
  <textarea id="nachricht" name="nachricht"
  rows="6" required minlength="20"></textarea>
  </fieldset>
  <fieldset>
  <legend>Weiteres</legend>
  <fieldset>
  <legend>Wie haben Sie von uns erfahren?</legend>
  <label>
  <input type="radio" name="herkunft" value="internet">
  Internet
  </label>
  <label>
  <input type="radio" name="herkunft" value="empfehlung">
  Empfehlung
  </label>
  <label>
  <input type="radio" name="herkunft" value="anzeige">
  Anzeige
  </label>
  </fieldset>
  <label>
  <input type="checkbox" name="datenschutz"
  value="ja" required>
  Ich habe die Datenschutzerklärung gelesen *
  </label>
 </fieldset>
  <button type="submit">Nachricht absenden</button>
</form>
  colspan=“5” 
</tfoot>
</body>
</html>
